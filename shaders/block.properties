# Maps Minecraft block IDs to integers exposed in the vertex shader as mc_Entity.x.
# We use one ID per "material class" so the shader can pick a reflectivity value.

# Smooth, semi-mirror surfaces (glass and ice)
block.100=minecraft:glass minecraft:glass_pane \
          minecraft:white_stained_glass minecraft:orange_stained_glass minecraft:magenta_stained_glass \
          minecraft:light_blue_stained_glass minecraft:yellow_stained_glass minecraft:lime_stained_glass \
          minecraft:pink_stained_glass minecraft:gray_stained_glass minecraft:light_gray_stained_glass \
          minecraft:cyan_stained_glass minecraft:purple_stained_glass minecraft:blue_stained_glass \
          minecraft:brown_stained_glass minecraft:green_stained_glass minecraft:red_stained_glass \
          minecraft:black_stained_glass \
          minecraft:ice minecraft:packed_ice minecraft:blue_ice minecraft:frosted_ice

# Polished metal / gem blocks
block.101=minecraft:iron_block minecraft:gold_block minecraft:diamond_block \
          minecraft:emerald_block minecraft:netherite_block

# Water (gated separately so wave normals don't get applied to stained glass etc.)
block.102=minecraft:water minecraft:flowing_water
